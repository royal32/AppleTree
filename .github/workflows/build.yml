name: Build macOS

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "12.0"

jobs:
  macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-${{ matrix.arch }}

      - name: Display build environment
        run: |
          sw_vers
          uname -m
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Package app bundle
        env:
          CODESIGN: "1"
          CODESIGN_IDENTITY: "-"
        run: scripts/package-macos-app.sh

      - name: Verify app bundle
        shell: bash
        run: |
          set -euo pipefail

          APP="target/release/macos/AppleTree.app"
          EXECUTABLE="$APP/Contents/MacOS/appletree"

          test -d "$APP"
          test -f "$APP/Contents/Info.plist"
          test -x "$EXECUTABLE"

          plutil -lint "$APP/Contents/Info.plist"
          codesign --verify --deep --strict --verbose=2 "$APP"

          ACTUAL_ARCH="$(lipo -archs "$EXECUTABLE")"
          echo "Executable architecture: $ACTUAL_ARCH"

          if [[ "$ACTUAL_ARCH" != "${{ matrix.arch }}" ]]; then
            echo "Expected ${{ matrix.arch }}, but built $ACTUAL_ARCH" >&2
            exit 1
          fi

      - name: Create distributable ZIP
        shell: bash
        run: |
          set -euo pipefail
      
          mkdir -p dist
      
          ditto -c -k \
            --sequesterRsrc \
            --keepParent \
            target/release/macos/AppleTree.app \
            "dist/AppleTree-macOS-${{ matrix.arch }}.zip"
      
          shasum -a 256 \
            "dist/AppleTree-macOS-${{ matrix.arch }}.zip" \
            > "dist/AppleTree-macOS-${{ matrix.arch }}.zip.sha256"
      
      - name: Upload app archive
        uses: actions/upload-artifact@v4
        with:
          name: AppleTree-macOS-${{ matrix.arch }}
          path: |
            dist/AppleTree-macOS-${{ matrix.arch }}.zip
            dist/AppleTree-macOS-${{ matrix.arch }}.zip.sha256
          if-no-files-found: error
          retention-days: 30
