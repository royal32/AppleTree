name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package app bundle
        run: CODESIGN=0 scripts/package-macos-app.sh

      - name: Create distributable ZIP
        shell: bash
        run: |
          set -euo pipefail
      
          mkdir -p dist
      
          ditto -c -k \
            --sequesterRsrc \
            --keepParent \
            target/release/macos/AppleTree.app \
            "dist/AppleTree-macOS-${{ matrix.arch }}.zip"
      
          shasum -a 256 \
            "dist/AppleTree-macOS-${{ matrix.arch }}.zip" \
            > "dist/AppleTree-macOS-${{ matrix.arch }}.zip.sha256"
      
      - name: Upload app archive
        uses: actions/upload-artifact@v4
        with:
          name: AppleTree-macOS-${{ matrix.arch }}
          path: |
            dist/AppleTree-macOS-${{ matrix.arch }}.zip
            dist/AppleTree-macOS-${{ matrix.arch }}.zip.sha256
          if-no-files-found: error
          retention-days: 30
